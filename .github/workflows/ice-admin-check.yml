name: ICE后台集成检查

on:
  push:
    branches: [main]
    paths:
      - "admin/ice-review-v2.js"
      - "admin/ice-report-integrated.js"
      - "admin/ice-report-integrated.css"
      - "admin/ice-report-review/index.html"
      - "netlify/functions/ice-report-integrated.js"
      - "scripts/ice-report-integrated.test.mjs"
      - ".github/workflows/ice-admin-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Check JavaScript syntax
        run: |
          node --check admin/ice-review-v2.js
          node --check admin/ice-report-integrated.js
          node --check netlify/functions/ice-report-integrated.js
      - name: Run integration checks
        run: node --test scripts/ice-report-integrated.test.mjs
