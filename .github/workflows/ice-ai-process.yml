name: ICE中文加工与发布

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/ice-trusted-source-promote.mjs"
      - "scripts/ice-publish-due.mjs"
      - "scripts/ice-pipeline-heartbeat.mjs"
      - "scripts/ice-ai-process-only.mjs"
      - "scripts/ice-official-source-only.mjs"
      - "scripts/ice-english-pretranslation-dedupe.mjs"
      - "scripts/category-pipeline-gate.mjs"
      - ".github/workflows/ice-ai-process.yml"
  schedule:
    - cron: "5,15,25,35,45,55 * * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-ai-process
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.guard.outputs.allowed }}
    steps:
      - id: guard
        shell: bash
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          if [[ "${{ github.event_name }}" == "schedule" ]] && (( 10#$NY_HOUR >= 2 && 10#$NY_HOUR < 8 )); then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          fi

  process:
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_MODE: "process"
      ICE_OPENAI_MONTHLY_BUDGET_USD: "300"
      ICE_TOTAL_MONTHLY_BUDGET_USD: "700"
      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_AI_CONFIDENCE: "80"
      ICE_TRUSTED_AUTO_CONFIDENCE: "0"
      ICE_TRUSTED_MAX_AGE_MINUTES: "120"
      ICE_MAX_AI_POSTS_PER_RUN: "24"
      ICE_MAX_STORIES_PER_RUN: "18"
      ICE_NORMALIZE_MAX_STORIES: "24"
      ICE_TRANSLATE_MAX_STORIES: "24"
      ICE_CROSS_LANGUAGE_DEDUPE_MAX: "500"
      ICE_PUBLISHED_DEDUPE_DAYS: "30"
      ICE_PUBLISHED_SIMILARITY_THRESHOLD: "0.92"
      ICE_REVIEW_DUPLICATE_THRESHOLD: "0.92"
      ICE_UNREVIEWED_EXPIRE_HOURS: "2"
      ICE_DEDUPE_HOURS: "720"
      ICE_PUBLISH_INTERVAL_MINUTES: "10"
      ICE_ENGLISH_DEDUPE_WINDOW_HOURS: "720"
      ICE_ENGLISH_DEDUPE_CANDIDATE_MINUTES: "120"
      ICE_ENGLISH_DEDUPE_MAX: "1500"
      ICE_ENGLISH_DEDUPE_THRESHOLD: "0.92"
      ICE_OFFICIAL_FILTER_MAX: "1500"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Read ICE category CMS switches
        id: category
        run: node scripts/category-pipeline-gate.mjs ice
      - name: Stop cleanly when ICE or both workers are disabled
        if: steps.category.outputs.enabled != 'true' || (steps.category.outputs.ai_rewrite != 'true' && steps.category.outputs.auto_publish != 'true')
        run: echo "后台已停用ICE栏目，或同时关闭AI改写与自动发布；本轮安全结束。"
      - name: Write AI start heartbeat
        if: steps.category.outputs.enabled == 'true' && (steps.category.outputs.ai_rewrite == 'true' || steps.category.outputs.auto_publish == 'true')
        env:
          ICE_HEARTBEAT_STAGE: "ai-process"
          ICE_HEARTBEAT_STATUS: "running"
        run: node scripts/ice-pipeline-heartbeat.mjs || true
      - name: Keep official and monitored sources only
        if: steps.category.outputs.ai_rewrite == 'true'
        run: node scripts/ice-official-source-only.mjs
      - name: Strict English event dedupe before AI
        if: steps.category.outputs.ai_rewrite == 'true'
        run: node scripts/ice-english-pretranslation-dedupe.mjs
      - name: Process database AI batch without X API
        if: steps.category.outputs.ai_rewrite == 'true'
        env:
          CATEGORY_AI_PROMPT: ${{ steps.category.outputs.ai_prompt }}
        run: node scripts/ice-ai-process-only.mjs
      - name: Normalize and translate to Chinese
        if: steps.category.outputs.ai_rewrite == 'true'
        env:
          CATEGORY_AI_PROMPT: ${{ steps.category.outputs.ai_prompt }}
        run: |
          node scripts/ice-editorial-normalize.mjs
          node scripts/ice-translate-title-body.mjs
      - name: Final dedupe and publish
        if: steps.category.outputs.auto_publish == 'true'
        env:
          ICE_FORCE_FIRST_PUBLISH: "true"
          ICE_PUBLISH_MAX_PER_RUN: "10"
          CATEGORY_PUSH_X: ${{ steps.category.outputs.push_x }}
          CATEGORY_PUSH_TELEGRAM: ${{ steps.category.outputs.push_telegram }}
        run: |
          node scripts/ice-cross-language-dedupe.mjs || true
          node scripts/ice-dedupe-v3.mjs || true
          node scripts/ice-clean-existing-review-duplicates.mjs || true
          node scripts/ice-trusted-source-promote.mjs
          node scripts/ice-publish-due.mjs
      - name: Write AI success heartbeat
        if: success() && steps.category.outputs.enabled == 'true'
        env:
          ICE_HEARTBEAT_STAGE: "ai-process"
          ICE_HEARTBEAT_STATUS: "success"
        run: node scripts/ice-pipeline-heartbeat.mjs || true
      - name: Write AI failure heartbeat
        if: failure()
        env:
          ICE_HEARTBEAT_STAGE: "ai-process"
          ICE_HEARTBEAT_STATUS: "failure"
          ICE_HEARTBEAT_ERROR: "ICE category CMS gate, AI processing or publishing workflow failed"
        run: node scripts/ice-pipeline-heartbeat.mjs || true
