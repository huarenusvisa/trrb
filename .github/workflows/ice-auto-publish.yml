name: ICE执法自动抓取发布

on:
  workflow_dispatch:

  schedule:
    - cron: "17 6,11,16,21 * * *"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: trrb-ice-auto-publish
  cancel-in-progress: false

jobs:
  sync-ice-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch, rewrite and publish ICE news
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SITE_URL: "https://trrb.net"
          ICE_QUERY: "from:ICEgov -is:retweet -is:reply"
          ICE_BOOTSTRAP_LIMIT: "8"
          ICE_MAX_NEW_POSTS: "30"
          ICE_USE_X_MEDIA: "true"
          ICE_MIN_CONFIDENCE: "80"
        run: node scripts/ice-sync.mjs

      - name: Commit generated ICE news
        shell: bash
        run: |
          git config user.name "TRRB ICE Bot"
          git config user.email "bot@trrb.net"

          git add -A

          if git diff --cached --quiet; then
            echo "No new ICE content."
            exit 0
          fi

          git commit -m "Auto publish ICE news"
          git push
