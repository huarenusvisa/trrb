name: ICE多信源抓取与交叉审核

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "collect=正常抓取；bootstrap=初始化；dry-run=审核但不自动排期"
        required: true
        default: collect
        type: choice
        options:
          - collect
          - bootstrap
          - dry-run
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-multisource
  cancel-in-progress: false

jobs:
  ice-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'collect' }}

      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_AI_CONFIDENCE: "80"
      ICE_MAX_AI_POSTS_PER_RUN: "20"
      ICE_MAX_RETRIES: "5"
      ICE_PUBLISH_INTERVAL_MINUTES: "30"
      ICE_MAX_STORIES_PER_RUN: "10"
      ICE_NORMALIZE_MAX_STORIES: "30"
      ICE_OFFICIALS_PER_QUERY: "10"
      ICE_MEDIA_PER_QUERY: "10"
      ICE_ORGS_PER_QUERY: "15"
      ICE_DISCOVERY_MIN_FOLLOWERS: "1000"
      ICE_MONTHLY_X_POST_READ_CAP: "52000"
      ICE_DAILY_X_REQUEST_CAP: "190"
      ICE_VALIDATE_SOURCE_HANDLES: "false"

      # V3高召回参数
      ICE_HIGH_RECALL_LOOKBACK_HOURS: "24"
      ICE_HIGH_RECALL_RESULTS_PER_QUERY: "50"
      ICE_HIGH_RECALL_MIN_SCORE: "45"
      ICE_HIGH_RECALL_MIN_FOLLOWERS: "500"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate ICE architecture
        run: |
          node --check scripts/ice-high-recall-discovery.mjs
          node --check scripts/ice-multisource.mjs
          node --check scripts/ice-editorial-normalize.mjs
          node --check scripts/ice-publish-due.mjs
          node --check scripts/ice-enable-first-backfill.mjs
          node --test scripts/ice-architecture.test.mjs
          node scripts/ice-multisource.mjs --self-test

      - name: High-recall event discovery
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-high-recall-discovery.mjs

      - name: Enable one-time first-run backfill
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-enable-first-backfill.mjs

      - name: Fetch, extract and cross-check ICE news
        run: node scripts/ice-multisource.mjs --mode="$RUN_MODE"

      - name: Translate and format Chinese ICE briefs
        run: node scripts/ice-editorial-normalize.mjs

      - name: Publish first approved ICE story immediately
        if: env.RUN_MODE == 'collect'
        env:
          ICE_FORCE_FIRST_PUBLISH: "true"
          ICE_PUBLISH_MAX_PER_RUN: "1"
        run: node scripts/ice-publish-due.mjs
