name: ICE全美执法事件追踪自动发布

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: trrb-ice-v45-event-tracking
  cancel-in-progress: false

jobs:
  sync-ice-news:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate ICE automation code
        shell: bash
        run: |
          set -e
          node --check scripts/ice-sync.mjs
          node -e "const r=JSON.parse(require('fs').readFileSync('data/ice-source-registry.json','utf8')); if(r.query_lanes.length!==72) throw new Error('Expected 72 lanes'); console.log('ICE registry lanes:',r.query_lanes.length)"

      - name: Fetch and publish ICE news from last 24 hours
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SITE_URL: "https://trrb.net"
          ICE_LOOKBACK_HOURS: "24"
          ICE_MAX_QUERY_LANES: "72"
          ICE_LANES_PER_RUN: "28"
          ICE_MAX_RESULTS_PER_LANE: "50"
          ICE_MAX_PAGES_PER_LANE: "1"
          ICE_BOOTSTRAP_LIMIT: "150"
          ICE_MAX_NEW_POSTS: "90"
          ICE_MIN_CONFIDENCE: "76"
          ICE_USE_X_MEDIA: "true"
          ICE_DEDUPE_THRESHOLD: "0.84"
          ICE_EXACT_DUPLICATE_THRESHOLD: "0.93"
          ICE_EVENT_MATCH_THRESHOLD: "0.58"
          ICE_EVENT_HISTORY_DAYS: "14"
          ICE_MAX_PENDING_RETRIES: "5"
        run: node scripts/ice-sync.mjs

      - name: Commit generated ICE news
        shell: bash
        run: |
          set -e
          git config user.name "TRRB ICE Bot"
          git config user.email "bot@trrb.net"
          git add -A
          if git diff --cached --quiet; then
            echo "No new publishable ICE content."
            exit 0
          fi
          git commit -m "Auto publish ICE event tracking news"
          git pull --rebase origin main
          git push origin main
