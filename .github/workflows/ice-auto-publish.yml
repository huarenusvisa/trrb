name: ICE多来源自动抓取发布

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: trrb-ice-multisource
  cancel-in-progress: false

jobs:
  sync-ice-news:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate ICE automation code
        shell: bash
        run: |
          set -e
          test -f scripts/ice-sync.mjs
          node --check scripts/ice-sync.mjs
          test -f data/ice-source-registry.json
          node -e "JSON.parse(require('fs').readFileSync('data/ice-source-registry.json','utf8')); console.log('ICE source registry JSON valid')"

      - name: Fetch and publish ICE news from last 24 hours
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SITE_URL: "https://trrb.net"
          ICE_LOOKBACK_HOURS: "24"
          ICE_DEDUPE_THRESHOLD: "0.78"
          ICE_BOOTSTRAP_LIMIT: "50"
          ICE_MAX_NEW_POSTS: "120"
          ICE_USE_X_MEDIA: "true"
          ICE_MIN_CONFIDENCE: "80"
          ICE_MAX_PENDING_RETRIES: "5"
        run: node scripts/ice-sync.mjs

      - name: Commit generated ICE news
        shell: bash
        run: |
          set -e
          git config user.name "TRRB ICE Bot"
          git config user.email "bot@trrb.net"
          git add -A

          if git diff --cached --quiet; then
            echo "No new ICE content."
            exit 0
          fi

          git commit -m "Auto publish ICE multisource news"
          git push
