name: ICE旧版手动应急流程

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "仅用于人工应急，正常定时已拆分为快速采集和AI加工两条流程"
        required: true
        default: collect
        type: choice
        options: [collect, dry-run]

permissions:
  contents: read

concurrency:
  group: trrb-ice-legacy-manual
  cancel-in-progress: true

jobs:
  manual-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_MODE: ${{ inputs.mode }}
      ICE_MAX_SOURCE_AGE_MINUTES: "60"
      ICE_MAX_AI_POSTS_PER_RUN: "30"
      ICE_MAX_STORIES_PER_RUN: "25"
      ICE_TRANSLATE_MAX_STORIES: "30"
      ICE_PUBLISH_MAX_PER_RUN: "10"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Emergency collection
        if: inputs.mode == 'collect'
        run: |
          node scripts/ice-priority-discovery.mjs || true
          node scripts/ice-ero-official-discovery.mjs || true
          node scripts/ice-precollect-published-dedupe.mjs || true
          node scripts/ice-fast-intake.mjs || true
      - name: Emergency AI processing
        run: |
          node scripts/ice-multisource.mjs --mode="$RUN_MODE"
          node scripts/ice-editorial-normalize.mjs || true
          node scripts/ice-translate-title-body.mjs || true
      - name: Emergency publish
        if: inputs.mode == 'collect'
        run: |
          node scripts/ice-clean-existing-review-duplicates.mjs || true
          node scripts/ice-trusted-source-promote.mjs || true
          node scripts/ice-publish-due.mjs || true
