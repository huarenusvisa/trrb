name: ICE多信源抓取与交叉审核

on:
  push:
    branches:
      - main
    paths:
      - "scripts/ice-high-recall-discovery.mjs"
      - "scripts/ice-priority-discovery.mjs"
      - "scripts/ice-publish-due.mjs"
      - "scripts/ice-ero-official-discovery.mjs"
      - "scripts/ice-drop-stale-posts.mjs"
      - "scripts/ice-expire-unreviewed.mjs"
      - "scripts/ice-dedupe-v3.mjs"
      - "scripts/ice-translate-title-body.mjs"
      - "scripts/ice-trusted-source-promote.mjs"
      - "netlify/functions/ice-review-list-v3.js"
      - ".github/workflows/ice-auto-publish.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "collect=正常抓取；bootstrap=初始化；dry-run=审核但不自动排期"
        required: true
        default: collect
        type: choice
        options:
          - collect
          - bootstrap
          - dry-run
  schedule:
    - cron: "*/10 * * * *"
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-multisource
  cancel-in-progress: true

jobs:
  new-york-time-gate:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.guard.outputs.allowed }}
      ny_time: ${{ steps.guard.outputs.ny_time }}
    steps:
      - id: guard
        name: Enforce New York 02:00-08:00 quiet hours
        shell: bash
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          NY_TIME=$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')
          echo "ny_time=$NY_TIME" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "schedule" ]] && (( 10#$NY_HOUR >= 2 && 10#$NY_HOUR < 8 )); then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "纽约时间 $NY_TIME，处于02:00-08:00休息时段，本轮停止采集和AI处理。"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "纽约时间 $NY_TIME，本轮允许运行。"
          fi

  ice-pipeline:
    needs: new-york-time-gate
    if: needs.new-york-time-gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'collect' }}
      ICE_OPENAI_MONTHLY_BUDGET_USD: "300"
      ICE_X_MONTHLY_BUDGET_USD: "400"
      ICE_TOTAL_MONTHLY_BUDGET_USD: "700"
      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_AI_CONFIDENCE: "80"
      ICE_TRUSTED_AUTO_CONFIDENCE: "80"
      ICE_TRUSTED_MAX_AGE_MINUTES: "120"
      ICE_MAX_AI_POSTS_PER_RUN: "220"
      ICE_FAST_INTAKE_MAX: "1000"
      ICE_MAX_RETRIES: "5"
      ICE_PUBLISH_INTERVAL_MINUTES: "10"
      ICE_MAX_STORIES_PER_RUN: "140"
      ICE_NORMALIZE_MAX_STORIES: "200"
      ICE_TRANSLATE_MAX_STORIES: "160"
      ICE_OFFICIALS_PER_QUERY: "8"
      ICE_MEDIA_PER_QUERY: "12"
      ICE_ORGS_PER_QUERY: "18"
      ICE_DISCOVERY_MIN_FOLLOWERS: "1000"
      ICE_MONTHLY_X_POST_READ_CAP: "65000"
      ICE_DAILY_X_REQUEST_CAP: "300"
      ICE_VALIDATE_SOURCE_HANDLES: "false"
      ICE_HIGH_RECALL_LOOKBACK_HOURS: "1"
      ICE_DEDUPE_HOURS: "720"
      ICE_MAX_SOURCE_AGE_HOURS: "1"
      ICE_MAX_SOURCE_AGE_MINUTES: "60"
      ICE_UNREVIEWED_EXPIRE_HOURS: "2"
      ICE_HIGH_RECALL_RESULTS_PER_QUERY: "100"
      ICE_HIGH_RECALL_MAX_PAGES: "3"
      ICE_HIGH_RECALL_MIN_SCORE: "40"
      ICE_HIGH_RECALL_MIN_FOLLOWERS: "250"
      ICE_PRIORITY_LOOKBACK_MINUTES: "75"
      ICE_PRIORITY_MAX_PAGES: "2"
      ICE_PIPELINE_RESTART_GENERATION: "2026-07-16T12:52:00-04:00"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate ICE architecture
        run: |
          node --check scripts/ice-high-recall-discovery.mjs
          node --check scripts/ice-priority-discovery.mjs
          node --check scripts/ice-ero-official-discovery.mjs
          node --check scripts/ice-drop-stale-posts.mjs
          node --check scripts/ice-expire-unreviewed.mjs
          node --check scripts/ice-dedupe-v3.mjs
          node --check scripts/ice-multisource.mjs
          node --check scripts/ice-editorial-normalize.mjs
          node --check scripts/ice-filter-replies.mjs
          node --check scripts/ice-fast-intake.mjs
          node --check scripts/ice-translate-title-body.mjs
          node --check scripts/ice-trusted-source-promote.mjs
          node --check scripts/ice-publish-due.mjs
          node --check scripts/ice-enable-first-backfill.mjs
          node --test scripts/ice-architecture.test.mjs
          node --test scripts/ice-original-posts.test.mjs
          node scripts/ice-multisource.mjs --self-test

      - name: High-recall one-hour event discovery
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-high-recall-discovery.mjs

      - name: Priority account and missing-keyword discovery
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-priority-discovery.mjs

      - name: Safe regional ERO official discovery
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-ero-official-discovery.mjs

      - name: Drop source posts older than one hour
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-drop-stale-posts.mjs

      - name: Remove candidates not handled within two hours
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-expire-unreviewed.mjs

      - name: Enable ERO recovery
        if: env.RUN_MODE == 'collect'
        continue-on-error: true
        run: node scripts/ice-enable-first-backfill.mjs

      - name: Remove replies and comments before intake
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-filter-replies.mjs

      - name: Send fresh posts directly to review
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-fast-intake.mjs

      - name: Early event dedupe before expensive AI processing
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-dedupe-v3.mjs

      - name: Deep AI extraction and cross-check
        run: node scripts/ice-multisource.mjs --mode="$RUN_MODE"

      - name: Remove replies and comments after source rotation
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-filter-replies.mjs

      - name: Re-send remaining fresh backlog to review
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-fast-intake.mjs

      - name: Normalize Chinese ICE briefs
        run: node scripts/ice-editorial-normalize.mjs

      - name: Read all supplied text and generate 12 to 25 character titles
        run: node scripts/ice-translate-title-body.mjs

      - name: Final multi-dimensional event dedupe
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-dedupe-v3.mjs

      - name: Auto approve official agencies and trusted media only
        if: env.RUN_MODE == 'collect'
        run: node scripts/ice-trusted-source-promote.mjs

      - name: Publish trusted approved ICE stories immediately
        if: env.RUN_MODE == 'collect'
        env:
          ICE_FORCE_FIRST_PUBLISH: "true"
          ICE_PUBLISH_MAX_PER_RUN: "40"
        run: node scripts/ice-publish-due.mjs

      - name: Pipeline summary
        if: always()
        run: |
          echo "ICE realtime pipeline completed."
          echo "New York quiet hours: 02:00-08:00."
          echo "Primary schedule: every ten minutes; recovery schedule: three minutes after each slot."
          echo "Collection window: one hour with a 75-minute priority-query overlap."
          echo "Official agencies and trusted media are AI edited and auto published."
          echo "All other accounts remain in manual review."
          echo "Event dedupe runs before and after AI normalization against a 30-day history window."
          echo "Unreviewed candidates expire after two hours."
          echo "OpenAI monthly budget: $ICE_OPENAI_MONTHLY_BUDGET_USD"
          echo "X monthly budget: $ICE_X_MONTHLY_BUDGET_USD"