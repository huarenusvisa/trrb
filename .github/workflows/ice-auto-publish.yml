name: TRRB 24小时实时新闻自动发布

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: trrb-24h-live-news
  cancel-in-progress: false

jobs:
  sync-news:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate automation code
        run: |
          node --check scripts/trump-sync.mjs
          node --check scripts/ice-sync.mjs
          node --check scripts/news-sync.mjs
          node --check scripts/build-news-index.mjs

      - name: Fetch and publish last 24 hours
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SITE_URL: "https://trrb.net"

          # 特朗普频道：只抓特朗普本人官方账号，不抓媒体报道或白宫转述。
          TRUMP_USE_X: "true"
          TRUMP_X_ACCOUNT: "realDonaldTrump"
          TRUMP_USE_TRUTH_SOCIAL: "true"
          TRUTH_SOCIAL_ACCT: "realDonaldTrump"
          TRUTH_SOCIAL_ACCOUNT_ID: "107780257626128497"
          TRUMP_LOOKBACK_HOURS: "24"
          TRUMP_MAX_PROCESS_PER_RUN: "30"
          TRUMP_MIN_CONFIDENCE: "82"
          TRUMP_USE_MEDIA: "true"

          # ICE频道继续使用当前已验证的24小时抓取、去重和热力图流程。
          ICE_LOOKBACK_HOURS: "24"
          ICE_BOOTSTRAP_LIMIT: "80"
          ICE_MAX_NEW_POSTS: "50"
          ICE_MAX_QUERY_LANES: "24"
          ICE_MAX_RESULTS_PER_LANE: "25"
          ICE_MAX_PAGES_PER_LANE: "1"
          ICE_MIN_CONFIDENCE: "80"
          ICE_USE_X_MEDIA: "true"
          ICE_DEDUPE_THRESHOLD: "0.78"
        run: node scripts/news-sync.mjs

      - name: Commit generated news
        shell: bash
        run: |
          git config user.name "TRRB News Bot"
          git config user.email "bot@trrb.net"
          git add -A

          if git diff --cached --quiet; then
            echo "No new publishable content."
            exit 0
          fi

          git commit -m "Auto publish 24h live news"
          git pull --rebase origin main
          git push origin main
