name: Expire Unreviewed ICE Reports

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ice-expire-unreviewed
  cancel-in-progress: false

jobs:
  expire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_UNREVIEWED_EXPIRE_HOURS: "10"
      ICE_EXPIRE_BATCH_SIZE: "500"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Delete unreviewed ICE candidates older than 10 hours
        run: node scripts/ice-expire-unreviewed.mjs
