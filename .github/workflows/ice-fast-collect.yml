name: ICE快速采集

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ice-fast-collect.yml"
      - "scripts/ice-pipeline-heartbeat.mjs"
      - "scripts/ice-priority-discovery.mjs"
      - "scripts/ice-ero-official-discovery.mjs"
      - "scripts/ice-official-source-only.mjs"
      - "scripts/ice-english-pretranslation-dedupe.mjs"
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-fast-collect
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.guard.outputs.allowed }}
    steps:
      - id: guard
        shell: bash
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          if [[ "${{ github.event_name }}" == "schedule" ]] && (( 10#$NY_HOUR >= 2 && 10#$NY_HOUR < 8 )); then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          fi

  official-priority:
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN || secrets.X_API_BEARER_TOKEN || secrets.TWITTER_BEARER_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_PRIORITY_LOOKBACK_MINUTES: "60"
      ICE_PRIORITY_MAX_PAGES: "3"
      ICE_MAX_SOURCE_AGE_MINUTES: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: node scripts/ice-priority-discovery.mjs

  regional-ero:
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN || secrets.X_API_BEARER_TOKEN || secrets.TWITTER_BEARER_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_MAX_SOURCE_AGE_MINUTES: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: node scripts/ice-ero-official-discovery.mjs

  intake:
    needs: [gate, official-priority, regional-ero]
    if: always() && needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_MAX_SOURCE_AGE_MINUTES: "60"
      ICE_RECENT_DUPLICATE_WINDOW_MINUTES: "60"
      ICE_PUBLISHED_DEDUPE_DAYS: "30"
      ICE_PUBLISHED_SIMILARITY_THRESHOLD: "0.92"
      ICE_PRECOLLECT_MAX: "1000"
      ICE_FAST_INTAKE_MAX: "600"
      ICE_ENGLISH_DEDUPE_WINDOW_HOURS: "720"
      ICE_ENGLISH_DEDUPE_CANDIDATE_MINUTES: "90"
      ICE_ENGLISH_DEDUPE_MAX: "2500"
      ICE_ENGLISH_DEDUPE_THRESHOLD: "0.92"
      ICE_OFFICIAL_FILTER_MAX: "3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Write collection start heartbeat
        env:
          ICE_HEARTBEAT_STAGE: "fast-collect"
          ICE_HEARTBEAT_STATUS: "running"
        run: node scripts/ice-pipeline-heartbeat.mjs || true
      - name: Filter and intake official English sources
        run: |
          node scripts/ice-official-source-only.mjs
          node scripts/ice-drop-stale-posts.mjs || true
          node scripts/ice-filter-replies.mjs || true
          node scripts/ice-english-pretranslation-dedupe.mjs
          node scripts/ice-precollect-published-dedupe.mjs
          node scripts/ice-fast-intake.mjs
          node scripts/ice-dedupe-v3.mjs || true
      - name: Write collection success heartbeat
        if: success()
        env:
          ICE_HEARTBEAT_STAGE: "fast-collect"
          ICE_HEARTBEAT_STATUS: "success"
        run: node scripts/ice-pipeline-heartbeat.mjs || true
      - name: Write collection failure heartbeat
        if: failure()
        env:
          ICE_HEARTBEAT_STAGE: "fast-collect"
          ICE_HEARTBEAT_STATUS: "failure"
          ICE_HEARTBEAT_ERROR: "ICE fast collection workflow failed"
        run: node scripts/ice-pipeline-heartbeat.mjs || true