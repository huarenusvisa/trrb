name: ICE前端规律发布

on:
  workflow_dispatch:
  schedule:
    - cron: "15,45 * * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-multisource
  cancel-in-progress: false

jobs:
  publish-one:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_PUBLISH_MAX_PER_RUN: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate publisher
        run: node --check scripts/ice-publish-due.mjs

      - name: Publish one due ICE story
        run: node scripts/ice-publish-due.mjs
