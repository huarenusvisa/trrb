name: ICE前端规律发布

on:
  workflow_dispatch:
  schedule:
    - cron: "5,35 * * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-front-publisher
  cancel-in-progress: false

jobs:
  publish-one:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_TRUSTED_AUTO_CONFIDENCE: "80"
      ICE_TRUSTED_MAX_AGE_MINUTES: "120"
      ICE_PUBLISH_MAX_PER_RUN: "10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate publisher and trusted-source promoter
        run: |
          node --check scripts/ice-trusted-source-promote.mjs
          node --check scripts/ice-publish-due.mjs

      - name: Approve fresh official and trusted-media ICE stories
        run: node scripts/ice-trusted-source-promote.mjs

      - name: Publish up to ten due ICE stories
        run: node scripts/ice-publish-due.mjs
