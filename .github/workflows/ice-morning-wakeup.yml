name: ICE纽约早八点唤醒

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ice-morning-wakeup.yml"
      - "scripts/ice-precollect-published-dedupe.mjs"
  schedule:
    - cron: "3 12,13 * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-morning-wakeup
  cancel-in-progress: false

jobs:
  wake-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_OPENAI_MONTHLY_BUDGET_USD: "300"
      ICE_X_MONTHLY_BUDGET_USD: "400"
      ICE_TOTAL_MONTHLY_BUDGET_USD: "700"
      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_AI_CONFIDENCE: "80"
      ICE_TRUSTED_AUTO_CONFIDENCE: "80"
      ICE_TRUSTED_MAX_AGE_MINUTES: "120"
      ICE_MAX_AI_POSTS_PER_RUN: "220"
      ICE_FAST_INTAKE_MAX: "1000"
      ICE_PRECOLLECT_MAX: "1200"
      ICE_MAX_RETRIES: "5"
      ICE_PUBLISH_INTERVAL_MINUTES: "10"
      ICE_MAX_STORIES_PER_RUN: "140"
      ICE_NORMALIZE_MAX_STORIES: "200"
      ICE_TRANSLATE_MAX_STORIES: "160"
      ICE_HIGH_RECALL_LOOKBACK_HOURS: "1"
      ICE_DEDUPE_HOURS: "2"
      ICE_MAX_SOURCE_AGE_HOURS: "1"
      ICE_MAX_SOURCE_AGE_MINUTES: "60"
      ICE_RECENT_DUPLICATE_WINDOW_MINUTES: "60"
      ICE_PUBLISHED_DEDUPE_DAYS: "30"
      ICE_PUBLISHED_SIMILARITY_THRESHOLD: "0.38"
      ICE_UNREVIEWED_EXPIRE_HOURS: "2"
      ICE_HIGH_RECALL_RESULTS_PER_QUERY: "100"
      ICE_HIGH_RECALL_MAX_PAGES: "3"
      ICE_HIGH_RECALL_MIN_SCORE: "45"
      ICE_HIGH_RECALL_MIN_FOLLOWERS: "500"

    steps:
      - id: gate
        name: Confirm New York morning wake window
        shell: bash
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          NY_TIME=$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')
          echo "纽约时间：$NY_TIME"
          if [[ "${{ github.event_name }}" == "schedule" ]] && (( 10#$NY_HOUR != 8 )); then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Morning health checks
        if: steps.gate.outputs.run == 'true'
        run: |
          node --check scripts/ice-high-recall-discovery.mjs
          node --check scripts/ice-ero-official-discovery.mjs
          node --check scripts/ice-precollect-published-dedupe.mjs
          node --check scripts/ice-multisource.mjs
          node --check scripts/ice-publish-due.mjs

      - name: Collect the latest one-hour ICE sources
        if: steps.gate.outputs.run == 'true'
        run: |
          node scripts/ice-high-recall-discovery.mjs
          node scripts/ice-ero-official-discovery.mjs

      - name: Clean compare and intake fresh sources
        if: steps.gate.outputs.run == 'true'
        run: |
          node scripts/ice-drop-stale-posts.mjs
          node scripts/ice-expire-unreviewed.mjs
          node scripts/ice-filter-replies.mjs
          node scripts/ice-precollect-published-dedupe.mjs
          node scripts/ice-fast-intake.mjs

      - name: AI extraction editing and event dedupe
        if: steps.gate.outputs.run == 'true'
        run: |
          node scripts/ice-multisource.mjs --mode=collect
          node scripts/ice-filter-replies.mjs
          node scripts/ice-precollect-published-dedupe.mjs
          node scripts/ice-fast-intake.mjs
          node scripts/ice-editorial-normalize.mjs
          node scripts/ice-translate-title-body.mjs
          node scripts/ice-dedupe-v3.mjs

      - name: Approve trusted sources and publish
        if: steps.gate.outputs.run == 'true'
        env:
          ICE_FORCE_FIRST_PUBLISH: "true"
          ICE_PUBLISH_MAX_PER_RUN: "40"
        run: |
          node scripts/ice-trusted-source-promote.mjs
          node scripts/ice-publish-due.mjs

      - name: Wake-up summary
        if: always()
        run: echo "ICE纽约早八点唤醒流程执行完毕；超过一小时、已发布重复和近一小时相似事件均在入库前过滤。"
