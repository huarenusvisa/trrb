name: ICE采集处理恢复通道

on:
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ice-pipeline-recovery.yml"
      - "scripts/ice-high-recall-discovery.mjs"
      - "scripts/ice-priority-discovery.mjs"

permissions:
  contents: read

concurrency:
  group: trrb-ice-recovery
  cancel-in-progress: true

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_MODE: "collect"
      ICE_HIGH_RECALL_LOOKBACK_HOURS: "1"
      ICE_PRIORITY_LOOKBACK_MINUTES: "75"
      ICE_HIGH_RECALL_RESULTS_PER_QUERY: "100"
      ICE_HIGH_RECALL_MAX_PAGES: "2"
      ICE_PRIORITY_MAX_PAGES: "2"
      ICE_HIGH_RECALL_MIN_SCORE: "40"
      ICE_HIGH_RECALL_MIN_FOLLOWERS: "250"
      ICE_MAX_SOURCE_AGE_MINUTES: "60"
      ICE_MAX_SOURCE_AGE_HOURS: "1"
      ICE_FAST_INTAKE_MAX: "400"
      ICE_MAX_AI_POSTS_PER_RUN: "80"
      ICE_MAX_STORIES_PER_RUN: "70"
      ICE_NORMALIZE_MAX_STORIES: "100"
      ICE_TRANSLATE_MAX_STORIES: "80"
      ICE_DEDUPE_HOURS: "12"
      ICE_AI_CONFIDENCE: "80"
      ICE_TRUSTED_AUTO_CONFIDENCE: "80"
      ICE_TRUSTED_MAX_AGE_MINUTES: "120"
      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_FORCE_FIRST_PUBLISH: "true"
      ICE_PUBLISH_MAX_PER_RUN: "20"
    steps:
      - name: Check New York quiet hours
        id: gate
        shell: bash
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          if [[ "${{ github.event_name }}" == "schedule" ]] && (( 10#$NY_HOUR >= 2 && 10#$NY_HOUR < 8 )); then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.allowed == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.gate.outputs.allowed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect recent ICE posts
        if: steps.gate.outputs.allowed == 'true'
        run: |
          node scripts/ice-high-recall-discovery.mjs
          node scripts/ice-priority-discovery.mjs
          node scripts/ice-ero-official-discovery.mjs

      - name: Clean and intake
        if: steps.gate.outputs.allowed == 'true'
        run: |
          node scripts/ice-drop-stale-posts.mjs
          node scripts/ice-filter-replies.mjs
          node scripts/ice-fast-intake.mjs

      - name: AI process fresh backlog
        if: steps.gate.outputs.allowed == 'true'
        run: |
          node scripts/ice-multisource.mjs --mode=collect
          node scripts/ice-editorial-normalize.mjs
          node scripts/ice-translate-title-body.mjs

      - name: Dedupe approve and publish
        if: steps.gate.outputs.allowed == 'true'
        run: |
          node scripts/ice-dedupe-v3.mjs
          node scripts/ice-trusted-source-promote.mjs
          node scripts/ice-publish-due.mjs
