name: ICE流水线自动唤醒看门狗

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  actions: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_WATCHDOG_MAX_AGE_MINUTES: "50"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check ICE pipeline heartbeat
        id: check
        run: node scripts/ice-workflow-watchdog.mjs

      - name: Re-dispatch ICE unified pipeline when stale
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          AGE_MINUTES: ${{ steps.check.outputs.age_minutes }}
        run: |
          echo "ICE pipeline heartbeat is stale (${AGE_MINUTES} minutes). Re-dispatching main workflow."
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/ice-unified-pipeline.yml/dispatches" \
            -d '{"ref":"main"}'
