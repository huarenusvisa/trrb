name: ICE流水线自动唤醒看门狗

on:
  workflow_dispatch:
  schedule:
    - cron: "5,20,35,50 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ice-pipeline-watchdog.yml"
      - "scripts/ice-workflow-watchdog.mjs"

permissions:
  contents: read
  actions: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_WATCHDOG_MAX_AGE_MINUTES: "35"
    steps:
      - name: Enforce New York watchdog window
        id: window
        shell: bash
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          NY_TIME=$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')
          if [[ "${{ github.event_name }}" == "schedule" ]] && (( 10#$NY_HOUR >= 2 && 10#$NY_HOUR < 8 )); then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "纽约时间 $NY_TIME，处于维护窗口；不检查、不重复唤醒生产流水线。"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "纽约时间 $NY_TIME，允许检查生产流水线心跳。"
          fi

      - uses: actions/checkout@v4
        if: steps.window.outputs.allowed == 'true'

      - uses: actions/setup-node@v4
        if: steps.window.outputs.allowed == 'true'
        with:
          node-version: "22"

      - name: Check ICE pipeline heartbeat
        if: steps.window.outputs.allowed == 'true'
        id: check
        run: node scripts/ice-workflow-watchdog.mjs

      - name: Re-dispatch ICE unified pipeline when stale
        if: steps.window.outputs.allowed == 'true' && steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          AGE_MINUTES: ${{ steps.check.outputs.age_minutes }}
        run: |
          echo "ICE pipeline heartbeat is stale (${AGE_MINUTES} minutes). Re-dispatching main workflow."
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/ice-unified-pipeline.yml/dispatches" \
            -d '{"ref":"main"}'

      - name: Watchdog summary
        if: always()
        run: echo "ICE看门狗检查完成；只有主流水线超过35分钟无成功心跳时才会补发一次。"
