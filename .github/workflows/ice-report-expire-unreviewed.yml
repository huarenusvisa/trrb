name: Expire Unreviewed ICE Reports

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trrb-ice-report-expiry
  cancel-in-progress: false

jobs:
  expire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ICE_REPORT_PRIVATE_BUCKET: ${{ secrets.ICE_REPORT_PRIVATE_BUCKET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate expiry script
        run: node --check scripts/ice-report-expire-unreviewed.mjs

      - name: Delete unreviewed submissions older than 12 hours
        run: node scripts/ice-report-expire-unreviewed.mjs
