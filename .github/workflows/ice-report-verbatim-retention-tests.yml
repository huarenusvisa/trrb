name: ICE Report Verbatim and Retention Tests

on:
  pull_request:
    paths:
      - "admin/ice-report-raw-lock.js"
      - "netlify/functions/ice-report-integrated.js"
      - "scripts/ice-report-expire-unreviewed.mjs"
      - "scripts/ice-report-verbatim-retention.test.mjs"
      - ".github/workflows/ice-report-expire-unreviewed.yml"
      - ".github/workflows/ice-report-verbatim-retention-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: JavaScript syntax checks
        run: |
          node --check admin/ice-report-raw-lock.js
          node --check netlify/functions/ice-report-integrated.js
          node --check scripts/ice-report-expire-unreviewed.mjs
          node --check scripts/ice-report-verbatim-retention.test.mjs

      - name: Verbatim publication and retention assertions
        run: node --test scripts/ice-report-verbatim-retention.test.mjs
