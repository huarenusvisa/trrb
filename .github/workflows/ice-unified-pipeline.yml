name: ICE一体化采集编辑发布

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ice-unified-pipeline.yml"
      - "scripts/ice-*.mjs"
      - "scripts/category-pipeline-gate.mjs"
      - "supabase/migrations/20260724_category_cms_v3.sql"
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: read

concurrency:
  group: trrb-ice-unified-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: "--max-http-header-size=65536"
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN || secrets.X_API_BEARER_TOKEN || secrets.TWITTER_BEARER_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_MODE: "process"
      ICE_PRIORITY_LOOKBACK_MINUTES: "720"
      ICE_EXTRA_LOOKBACK_MINUTES: "720"
      ICE_ADDED_SOURCE_LOOKBACK_HOURS: "12"
      ICE_ADDED_SOURCE_MAX_PAGES: "2"
      ICE_PRIORITY_MAX_PAGES: "3"
      ICE_PRIORITY_ROTATION_GROUPS: "3"
      ICE_ERO_ROTATION_GROUPS: "3"
      ICE_ERO_LOOKBACK_HOURS: "12"
      ICE_MAX_SOURCE_AGE_MINUTES: "720"
      ICE_RECENT_DUPLICATE_WINDOW_MINUTES: "720"
      ICE_PUBLISHED_DEDUPE_DAYS: "30"
      ICE_PUBLISHED_SIMILARITY_THRESHOLD: "0.92"
      ICE_REVIEW_DUPLICATE_THRESHOLD: "0.92"
      ICE_ENGLISH_DEDUPE_WINDOW_HOURS: "720"
      ICE_ENGLISH_DEDUPE_CANDIDATE_MINUTES: "750"
      ICE_ENGLISH_DEDUPE_MAX: "2500"
      ICE_ENGLISH_DEDUPE_THRESHOLD: "0.92"
      ICE_OFFICIAL_FILTER_MAX: "3000"
      ICE_PRECOLLECT_MAX: "1000"
      ICE_FAST_INTAKE_MAX: "600"
      ICE_MAX_AI_POSTS_PER_RUN: "24"
      ICE_MAX_STORIES_PER_RUN: "18"
      ICE_NORMALIZE_MAX_STORIES: "24"
      ICE_TRANSLATE_MAX_STORIES: "24"
      ICE_CROSS_LANGUAGE_DEDUPE_MAX: "500"
      ICE_AUTO_PUBLISH_SCORE: "80"
      ICE_AI_CONFIDENCE: "80"
      ICE_TRUSTED_AUTO_CONFIDENCE: "0"
      ICE_TRUSTED_MAX_AGE_MINUTES: "720"
      ICE_UNREVIEWED_EXPIRE_HOURS: "12"
      ICE_DEDUPE_HOURS: "720"
      ICE_PUBLISH_INTERVAL_MINUTES: "10"
    steps:
      - name: Enforce New York production window
        id: window
        shell: bash
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          NY_TIME=$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')
          echo "ny_time=$NY_TIME" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "schedule" ]] && (( 10#$NY_HOUR >= 2 && 10#$NY_HOUR < 8 )); then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "纽约时间 $NY_TIME，处于02:00-08:00维护时段，本轮不调用X、不调用OpenAI、不发布。"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "纽约时间 $NY_TIME，本轮执行完整ICE流水线。"
          fi

      - uses: actions/checkout@v4
        if: steps.window.outputs.allowed == 'true'

      - uses: actions/setup-node@v4
        if: steps.window.outputs.allowed == 'true'
        with:
          node-version: "22"

      - name: Read ICE category CMS switches
        if: steps.window.outputs.allowed == 'true'
        id: category
        run: node scripts/category-pipeline-gate.mjs ice

      - name: Show effective ICE category policy
        if: steps.window.outputs.allowed == 'true'
        run: |
          echo "enabled=${{ steps.category.outputs.enabled }}"
          echo "auto_fetch=${{ steps.category.outputs.auto_fetch }}"
          echo "ai_rewrite=${{ steps.category.outputs.ai_rewrite }}"
          echo "auto_publish=${{ steps.category.outputs.auto_publish }}"
          echo "push_x=${{ steps.category.outputs.push_x }}"
          echo "push_telegram=${{ steps.category.outputs.push_telegram }}"

      - name: Stop cleanly when ICE category is disabled
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.enabled != 'true'
        run: echo "ICE栏目已在后台停用，本轮不采集、不改写、不发布。"

      - name: Write pipeline start heartbeat
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.enabled == 'true'
        env:
          ICE_HEARTBEAT_STAGE: "unified-pipeline"
          ICE_HEARTBEAT_STATUS: "running"
        run: node scripts/ice-pipeline-heartbeat.mjs || true

      - name: Collect official and monitored X sources with retry
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.auto_fetch == 'true'
        shell: bash
        run: |
          set +e
          priority_ok=0
          ero_ok=0
          extra_ok=0
          added_ok=0

          for attempt in 1 2 3; do
            echo "Priority collector attempt $attempt/3"
            node scripts/ice-priority-discovery.mjs && { priority_ok=1; break; }
            sleep $((attempt * 20))
          done

          for attempt in 1 2 3; do
            echo "ERO collector attempt $attempt/3"
            node scripts/ice-ero-official-discovery.mjs && { ero_ok=1; break; }
            sleep $((attempt * 20))
          done

          for attempt in 1 2; do
            echo "Extra monitored collector attempt $attempt/2"
            node scripts/ice-extra-monitored-discovery.mjs && { extra_ok=1; break; }
            sleep $((attempt * 15))
          done

          for attempt in 1 2; do
            echo "Added source collector attempt $attempt/2"
            node scripts/ice-added-source-discovery.mjs && { added_ok=1; break; }
            sleep $((attempt * 15))
          done

          echo "priority_ok=$priority_ok ero_ok=$ero_ok extra_ok=$extra_ok added_ok=$added_ok"
          if [[ "$priority_ok" -eq 0 && "$ero_ok" -eq 0 && "$extra_ok" -eq 0 && "$added_ok" -eq 0 ]]; then
            echo "All ICE collectors failed after retries."
            exit 1
          fi

      - name: Record collection disabled state
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.enabled == 'true' && steps.category.outputs.auto_fetch != 'true'
        run: echo "后台已关闭ICE自动抓取；保留现有候选，不执行X采集。"

      - name: Filter, English dedupe and intake
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.auto_fetch == 'true'
        shell: bash
        run: |
          set -e
          node scripts/ice-official-source-only.mjs
          node scripts/ice-drop-stale-posts.mjs || true
          node scripts/ice-filter-replies.mjs || true
          node scripts/ice-english-pretranslation-dedupe.mjs
          node scripts/ice-precollect-published-dedupe.mjs
          node scripts/ice-fast-intake.mjs
          node scripts/ice-dedupe-v3.mjs || true

      - name: AI process database batch
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.ai_rewrite == 'true'
        env:
          CATEGORY_AI_PROMPT: ${{ steps.category.outputs.ai_prompt }}
        run: node scripts/ice-ai-process-only.mjs

      - name: Record AI rewrite disabled state
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.enabled == 'true' && steps.category.outputs.ai_rewrite != 'true'
        run: echo "后台已关闭ICE AI改写；本轮不生成或覆盖AI标题、摘要和正文。"

      - name: Normalize and translate to Chinese
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.ai_rewrite == 'true'
        env:
          CATEGORY_AI_PROMPT: ${{ steps.category.outputs.ai_prompt }}
        shell: bash
        run: |
          set -e
          node scripts/ice-editorial-normalize.mjs
          node scripts/ice-translate-title-body.mjs

      - name: Restore human approvals, final dedupe and publish
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.auto_publish == 'true'
        env:
          ICE_FORCE_FIRST_PUBLISH: "true"
          ICE_PUBLISH_MAX_PER_RUN: "10"
          CATEGORY_PUSH_X: ${{ steps.category.outputs.push_x }}
          CATEGORY_PUSH_TELEGRAM: ${{ steps.category.outputs.push_telegram }}
        shell: bash
        run: |
          set -e
          node scripts/ice-restore-human-approved.mjs || true
          node scripts/ice-cross-language-dedupe.mjs || true
          node scripts/ice-dedupe-v3.mjs || true
          node scripts/ice-clean-existing-review-duplicates.mjs || true
          node scripts/ice-trusted-source-promote.mjs
          node scripts/ice-publish-due.mjs

      - name: Record automatic publishing disabled state
        if: steps.window.outputs.allowed == 'true' && steps.category.outputs.enabled == 'true' && steps.category.outputs.auto_publish != 'true'
        run: echo "后台已关闭ICE自动发布；已审核内容保留在待发布状态。"

      - name: Write pipeline success heartbeat
        if: success() && steps.window.outputs.allowed == 'true' && steps.category.outputs.enabled == 'true'
        env:
          ICE_HEARTBEAT_STAGE: "unified-pipeline"
          ICE_HEARTBEAT_STATUS: "success"
        run: node scripts/ice-pipeline-heartbeat.mjs || true

      - name: Write pipeline failure heartbeat
        if: failure() && steps.window.outputs.allowed == 'true'
        env:
          ICE_HEARTBEAT_STAGE: "unified-pipeline"
          ICE_HEARTBEAT_STATUS: "failure"
          ICE_HEARTBEAT_ERROR: "ICE category CMS gate, collection, AI processing or publishing workflow failed"
        run: node scripts/ice-pipeline-heartbeat.mjs || true

      - name: Quiet-hours summary
        if: steps.window.outputs.allowed != 'true'
        run: echo "ICE生产流水线处于纽约02:00-08:00维护窗口；08:07将按12小时窗口自动补抓。"
