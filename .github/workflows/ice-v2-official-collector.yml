name: ICE v2 Official Collector

on:
  workflow_dispatch:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: read

concurrency:
  group: ice-v2-official-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.ref == 'refs/heads/ice-v2-rebuild' || github.ref == 'refs/heads/main'
    env:
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate collector
        run: |
          node --check scripts/ice-v2-source-policy.mjs
          node --check scripts/ice-v2-collector-core.mjs
          node --check scripts/ice-v2-collect.mjs
          node --test scripts/ice-v2-source-policy.test.mjs
          node --test scripts/ice-v2-collect.test.mjs
      - name: Collect official and policy sources
        run: node scripts/ice-v2-collect.mjs --mode=official
