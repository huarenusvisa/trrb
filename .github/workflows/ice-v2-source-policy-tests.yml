name: ICE v2 Full Validation

on:
  push:
    branches:
      - ice-v2-rebuild
    paths:
      - "SUPABASE-ICE-V2-MIGRATION.sql"
      - "data/ice-v2-source-policy.json"
      - "scripts/ice-v2-*.mjs"
      - "scripts/ice-v2-*.test.mjs"
      - "admin/ice-review-v2.js"
      - "netlify/functions/ice-v2-health.js"
      - "netlify/functions/ice-v2-health.test.js"
      - "netlify/functions/ice-review-list-v3.js"
      - "netlify/functions/_shared/ice-v2-*.js"
      - ".github/workflows/ice-v2-*.yml"
  pull_request:
    paths:
      - "SUPABASE-ICE-V2-MIGRATION.sql"
      - "data/ice-v2-source-policy.json"
      - "scripts/ice-v2-*.mjs"
      - "scripts/ice-v2-*.test.mjs"
      - "admin/ice-review-v2.js"
      - "netlify/functions/ice-v2-health.js"
      - "netlify/functions/ice-v2-health.test.js"
      - "netlify/functions/ice-review-list-v3.js"
      - "netlify/functions/_shared/ice-v2-*.js"
      - ".github/workflows/ice-v2-*.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Syntax checks
        run: |
          node --check scripts/ice-v2-source-policy.mjs
          node --check scripts/ice-v2-collector-core.mjs
          node --check scripts/ice-v2-collect.mjs
          node --check scripts/ice-v2-event-core.mjs
          node --check scripts/ice-v2-event-cluster.mjs
          node --check scripts/ice-v2-editor-core.mjs
          node --check scripts/ice-v2-editor.mjs
          node --check scripts/ice-v2-cleanup-core.mjs
          node --check scripts/ice-v2-cleanup-legacy.mjs
          node --check scripts/ice-v2-readiness-core.mjs
          node --check scripts/ice-v2-readiness.mjs
          node --check scripts/ice-v2-registry-export.mjs
          node --check admin/ice-review-v2.js
          node --check netlify/functions/_shared/ice-v2-health.js
          node --check netlify/functions/_shared/ice-v2-review.js
          node --check netlify/functions/_shared/ice-v2-publish.js
          node --check netlify/functions/ice-v2-health.js
          node --check netlify/functions/ice-review-list-v3.js
          node --check netlify/functions/ice-v2-publish-now.js
      - name: Validate source policy and readiness
        run: |
          node scripts/ice-v2-source-policy.mjs
          node scripts/ice-v2-readiness.mjs
      - name: Export legacy-compatible whitelist registry
        run: node scripts/ice-v2-registry-export.mjs
      - name: Run tests
        run: |
          node --test scripts/ice-v2-source-policy.test.mjs
          node --test scripts/ice-v2-collector-core.test.mjs
          node --test scripts/ice-v2-collect.test.mjs
          node --test scripts/ice-v2-event-core.test.mjs
          node --test scripts/ice-v2-editor-core.test.mjs
          node --test scripts/ice-v2-cleanup-core.test.mjs
          node --test scripts/ice-v2-readiness-core.test.mjs
          node --test scripts/ice-v2-pipeline.test.mjs
          node --test scripts/ice-v2-migration.test.mjs
          node --test scripts/ice-v2-admin-health.test.mjs
          node --test netlify/functions/_shared/ice-v2-health.test.js
          node --test netlify/functions/_shared/ice-v2-review.test.js
          node --test netlify/functions/_shared/ice-v2-publish.test.js
          node --test netlify/functions/ice-v2-health.test.js
