name: TRRB V31 Homepage Migration

on:
  push:
    paths:
      - ".github/workflows/v31-homepage-migration.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trrb-v31-homepage-migration
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Apply guarded homepage migration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          home_path = Path("articles-home.js")

          index = index_path.read_text(encoding="utf-8")
          home = home_path.read_text(encoding="utf-8")

          old_index = '''    <script src="./articles-home-index.js?v=29.7"></script>
    <script src="./articles-home.js?v=30.2"></script>'''
          new_index = '''    <script src="./articles-home-index.js?v=29.7"></script>
    <script src="./config/channels.js?v=31.1"></script>
    <script src="./articles-home.js?v=31.1"></script>'''

          if old_index in index:
              index = index.replace(old_index, new_index, 1)
          elif new_index not in index:
              raise SystemExit("index.html script marker changed; refusing unsafe update")

          old_sections = '''function renderSections(articles) {
  const categories = ["美国时政", "美国警情", "中国官场", "移民美国", "庇护百科"];
  const sections = categories.map((category) => renderCategorySection(category, articles));
  sections.push(renderExposureWallCard());

  const root = document.querySelector("#sections-grid");
  if (root) root.innerHTML = sections.join("");
}'''

          new_sections = '''function getHomeNewsCategories() {
  const fallback = [
    "重要新闻",
    "热门头条",
    "驱逐快报",
    "美国时政",
    "美国警情",
    "中国官场",
    "移民美国",
    "庇护百科"
  ];

  if (!Array.isArray(window.TRRB_CHANNELS)) return fallback;

  const configured = window.TRRB_CHANNELS
    .filter((channel) => channel && channel.enabled !== false && channel.slug !== "expose" && channel.name)
    .slice()
    .sort((a, b) => Number(a.priority || 999) - Number(b.priority || 999))
    .map((channel) => normalizeCategory(channel.name))
    .filter(Boolean)
    .filter((name, index, list) => list.indexOf(name) === index);

  return configured.length ? configured : fallback;
}

function renderSections(articles) {
  const categories = getHomeNewsCategories();
  const sections = categories.map((category) => renderCategorySection(category, articles));
  sections.push(renderExposureWallCard());

  const root = document.querySelector("#sections-grid");
  if (root) root.innerHTML = sections.join("");
}'''

          if old_sections in home:
              home = home.replace(old_sections, new_sections, 1)
          elif new_sections not in home:
              raise SystemExit("articles-home.js renderSections marker changed; refusing unsafe update")

          if index.count('./config/channels.js?v=31.1') != 1:
              raise SystemExit("channels config must be loaded exactly once")
          if index.index('./config/channels.js?v=31.1') > index.index('./articles-home.js?v=31.1'):
              raise SystemExit("channels config must load before articles-home.js")
          if home.count('function getHomeNewsCategories()') != 1:
              raise SystemExit("getHomeNewsCategories must exist exactly once")
          if home.count('renderExposureWallCard()') < 2:
              raise SystemExit("exposure wall renderer was unexpectedly removed")

          index_path.write_text(index, encoding="utf-8")
          home_path.write_text(home, encoding="utf-8")
          PY

      - name: Validate JavaScript and site integrity
        shell: bash
        run: |
          node --check config/channels.js
          node --check articles-home.js
          node scripts/validate-site.mjs
          git diff --check

      - name: Verify migration output
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index = Path("index.html").read_text(encoding="utf-8")
          home = Path("articles-home.js").read_text(encoding="utf-8")

          required = ["重要新闻", "热门头条", "驱逐快报", "美国时政", "美国警情", "中国官场", "移民美国", "庇护百科"]
          missing = [name for name in required if name not in home]
          if missing:
              raise SystemExit(f"missing homepage channels: {missing}")
          if 'channel.slug !== "expose"' not in home:
              raise SystemExit("exposure wall filter missing")
          if 'sections.push(renderExposureWallCard())' not in home:
              raise SystemExit("exposure wall card append missing")
          if './config/channels.js?v=31.1' not in index:
              raise SystemExit("channels config script missing")
          print("V31 homepage migration validation passed")
          PY

      - name: Commit validated migration
        shell: bash
        run: |
          rm -f .github/workflows/v31-homepage-migration.yml
          git config user.name "TRRB V31 Migration"
          git config user.email "actions@users.noreply.github.com"
          git add index.html articles-home.js .github/workflows/v31-homepage-migration.yml
          if git diff --cached --quiet; then
            echo "No migration changes were needed."
            exit 0
          fi
          git commit -m "feat: show all configured homepage news channels"
          git push origin HEAD:main
