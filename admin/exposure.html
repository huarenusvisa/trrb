<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>曝光与评论管理｜唐人日报后台</title><link rel="stylesheet" href="./styles.css?v=29.12"><link rel="stylesheet" href="./exposure-admin.css?v=29.12"></head><body>
<section class="login-wrap" id="ex-login"><form class="login-card" id="ex-login-form"><div class="brand">唐人日报</div><h1>曝光管理登录</h1><label>邮箱</label><input id="ex-email" type="email" required><label>密码</label><input id="ex-password" type="password" required><button>登录</button><div class="message" id="ex-login-msg"></div></form></section>
<section class="ex-admin hidden" id="ex-admin"><header><div><h1>我要曝光管理</h1><p id="ex-user"></p></div><div><a href="./index.html">文章后台</a><a href="/exposure.html" target="_blank">打开前台</a><button id="ex-logout">退出</button></div></header>
<nav><button class="active" data-tab="posts">曝光投稿</button><button data-tab="comments">网友评论</button></nav>
<main><section id="posts-tab"><div class="ex-toolbar"><button id="refresh-posts">刷新</button><select id="post-status-filter"><option value="">全部状态</option><option value="published">已发布</option><option value="disputed">争议中</option><option value="resolved">已解决</option><option value="hidden">已隐藏</option><option value="removed">已撤稿</option></select></div><div class="table-wrap"><table><thead><tr><th>标题</th><th>投稿人/联系方式</th><th>状态</th><th>发布时间</th><th>操作</th></tr></thead><tbody id="ex-posts-body"></tbody></table></div></section>
<section id="comments-tab" class="hidden"><div class="ex-toolbar"><button id="refresh-comments">刷新</button></div><div class="table-wrap"><table><thead><tr><th>评论</th><th>昵称/邮箱</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="ex-comments-body"></tbody></table></div></section></main></section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./exposure-admin.js?v=29.12"></script></body></html>
