<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>唐人日报后台</title>
  <link rel="stylesheet" href="./styles.css?v=20260710-media1" />
</head>
<body>
  <div id="app">
    <section class="login-wrap" id="login-view">
      <form class="login-card" id="login-form">
        <div class="brand">唐人日报</div>
        <h1>后台登录</h1>
        <p>仅限授权管理员使用。</p>

        <label>邮箱</label>
        <input id="login-email" type="email" autocomplete="email" placeholder="请输入管理员邮箱" value="" required />

        <label>密码</label>
        <input id="login-password" type="password" autocomplete="current-password" placeholder="请输入密码" required />

        <button type="submit">登录后台</button>
        <div class="message" id="login-message"></div>
      </form>
    </section>

    <section class="admin-shell hidden" id="admin-view">
      <aside class="sidebar">
        <div class="logo">
          <b>唐人日报</b>
          <span>Admin Console</span>
        </div>
        <nav>
          <button class="nav-btn active" data-page="dashboard">控制台</button>
          <button class="nav-btn" data-page="articles">文章管理</button>
          <button class="nav-btn" data-page="new-article">发布文章</button>
          <button class="nav-btn" data-page="rankings">24小时热榜</button>
        </nav>
        <button class="logout" id="logout-btn">退出登录</button>
      </aside>

      <main class="main">
        <header class="top">
          <div>
            <h2 id="page-title">控制台</h2>
            <p id="admin-info">正在读取管理员身份...</p>
          </div>
          <a href="/" target="_blank">打开前台</a>
        </header>

        <section class="page" id="dashboard-page">
          <div class="cards">
            <article><strong id="count-articles">0</strong><span>文章总数</span></article>
            <article><strong id="count-published">0</strong><span>已发布</span></article>
            <article><strong id="count-draft">0</strong><span>草稿</span></article>
            <article><strong id="count-rankings">0</strong><span>热榜条目</span></article>
          </div>
          <div class="panel">
            <h3>后台状态</h3>
            <p id="system-status">后台已连接 Supabase。现在可以测试发布文章。</p>
          </div>
        </section>

        <section class="page hidden" id="articles-page">
          <div class="toolbar">
            <button id="refresh-articles">刷新文章</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>标题</th>
                  <th>栏目</th>
                  <th>状态</th>
                  <th>发布时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="articles-tbody"></tbody>
            </table>
          </div>
        </section>

        <section class="page hidden" id="new-article-page">
          <form class="editor-form" id="article-form">
            <div class="grid2">
              <div>
                <label>标题</label>
                <input id="article-title" required placeholder="请输入新闻标题" />
              </div>
              <div>
                <label>栏目</label>
                <select id="article-category"></select>
              </div>
            </div>

            <label>摘要</label>
            <textarea id="article-summary" rows="3" placeholder="文章摘要，显示在列表页"></textarea>

            <label>封面图片</label>
            <div class="media-uploader">
              <input id="article-cover-file" type="file" accept="image/jpeg,image/png,image/webp,image/gif" />
              <div class="media-help">从电脑选择图片。系统会自动压缩并上传到唐人日报自己的 Supabase Storage，不再依赖外部图片链接。</div>
              <div class="media-preview-wrap hidden" id="article-cover-preview-wrap">
                <img id="article-cover-preview" alt="封面预览" />
                <button type="button" class="secondary-btn" id="article-cover-remove">移除图片</button>
              </div>
              <div class="upload-progress hidden" id="article-cover-progress">准备上传…</div>
            </div>

            <details class="url-fallback">
              <summary>高级选项：使用外部图片 URL</summary>
              <input id="article-cover" placeholder="https://...（不建议长期使用）" />
            </details>

            <label>正文</label>
            <textarea id="article-content" rows="12" placeholder="请输入正文内容"></textarea>

            <div class="grid2">
              <div>
                <label>作者</label>
                <input id="article-author" value="Tang Ren Daily" />
              </div>
              <div>
                <label>状态</label>
                <select id="article-status">
                  <option value="draft">草稿</option>
                  <option value="published">已发布</option>
                  <option value="hidden">隐藏</option>
                </select>
              </div>
            </div>

            <button type="submit" id="article-submit">保存文章</button>
            <div class="message" id="article-message"></div>
          </form>
        </section>

        <section class="page hidden" id="rankings-page">
          <div class="panel">
            <h3>24小时热榜</h3>
            <p>第一版后台先显示数据库热榜条目。下一版会加入拖拽排序和一键选择文章。</p>
            <button id="refresh-rankings">刷新热榜</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>排序</th>
                  <th>热度</th>
                  <th>文章ID</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="rankings-tbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./admin.js?v=20260710-media1"></script>
</body>
</html>
