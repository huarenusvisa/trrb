<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="唐人日报我要曝光：发布诈骗、消费欺诈、食品卫生、店铺服务等当事人投稿，支持图片、视频和网友评论。" />
  <title>我要曝光｜唐人日报</title>
  <link rel="stylesheet" href="./styles.css?v=29.12" />
  <link rel="stylesheet" href="./exposure.css?v=29.12" />
</head>
<body>
  <header class="exposure-site-header">
    <div class="container exposure-site-header-inner">
      <a href="./index.html" class="exposure-brand"><img src="./trrb-logo-cropped.webp" alt="唐人日报" /><span>唐人日报</span></a>
      <nav><a href="./index.html">返回首页</a><a class="active" href="./exposure.html">我要曝光</a></nav>
    </div>
  </header>

  <main class="container exposure-page">
    <section class="exposure-hero">
      <div>
        <span class="exposure-kicker">网友公开投稿</span>
        <h1>我要曝光</h1>
        <p>曝光诈骗、消费欺诈、食品卫生、店铺纠纷及其他当事人希望公开的事件。投稿内容按当事人原文公开，可上传图片和视频。</p>
      </div>
      <button class="exposure-primary" type="button" data-open-exposure>立即曝光</button>
    </section>

    <section class="exposure-toolbar">
      <form id="exposure-search-form">
        <input id="exposure-search" type="search" placeholder="搜索曝光对象、标题或内容" />
        <button type="submit">搜索</button>
      </form>
      <span id="exposure-count">正在加载...</span>
    </section>

    <section class="exposure-grid" id="exposure-grid" aria-live="polite"></section>
    <button class="exposure-load-more" id="exposure-load-more" type="button">加载更多</button>
  </main>

  <dialog class="exposure-dialog" id="exposure-dialog" aria-labelledby="exposure-form-title">
    <div class="exposure-dialog-head">
      <div><span>公开投稿</span><h2 id="exposure-form-title">发布“我要曝光”</h2></div>
      <button type="button" data-close-exposure aria-label="关闭">×</button>
    </div>
    <form id="exposure-form" class="exposure-form">
      <label>曝光标题<span>*</span><input name="title" maxlength="160" required placeholder="例如：某店收款后拒绝发货，我决定公开经历" /></label>
      <div class="exposure-form-two">
        <label>被曝光对象<input name="targetName" maxlength="160" placeholder="个人、商家、机构名称（可选）" /></label>
        <label>发生地点<input name="location" maxlength="200" placeholder="城市、店铺或平台（可选）" /></label>
      </div>
      <div class="exposure-form-two">
        <label>发生日期<input name="happenedAt" type="date" /></label>
        <label>投稿人姓名或昵称<input name="authorName" maxlength="80" placeholder="前台可选择匿名" /></label>
      </div>
      <label>联系方式<input name="authorContact" maxlength="300" placeholder="邮箱、电话或微信，仅后台保存，不在前台公开" /></label>
      <label class="exposure-check"><input name="anonymous" type="checkbox" checked /> 前台显示为“匿名投稿人”</label>
      <label>曝光正文<span>*</span><textarea name="body" rows="10" maxlength="20000" required placeholder="请按原意写清事情经过、时间、地点、损失和希望公开的内容。"></textarea></label>

      <label class="exposure-file-box">
        <strong>上传图片或视频</strong>
        <span>最多12个文件；图片单张不超过10MB，视频单个不超过200MB。支持 JPG、PNG、WebP、GIF、MP4、MOV、WebM。</span>
        <input id="exposure-files" type="file" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/quicktime,video/webm" multiple />
      </label>
      <div class="exposure-file-list" id="exposure-file-list"></div>
      <div class="exposure-progress hidden" id="exposure-progress"></div>

      <label class="exposure-check exposure-disclaimer">
        <input name="disclaimerAccepted" type="checkbox" required />
        <span>我确认本内容由我本人主动公开，文字、图片、视频及事实陈述由我提供，我愿意承担由投稿内容产生的相应责任，并授权唐人日报公开展示。</span>
      </label>
      <p class="exposure-public-note">发布后将立即公开。被涉及方可以通过唐人日报联系邮箱提交回应、证据、更正或撤稿请求。</p>
      <button class="exposure-primary exposure-submit" type="submit">发布曝光</button>
      <div class="exposure-message" id="exposure-message"></div>
    </form>
  </dialog>

  <footer class="exposure-footer"><div class="container">唐人日报 · Tang Ren Daily　读者热线：<a href="tel:+19297898290">+1 929-789-8290</a></div></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./exposure.js?v=29.12"></script>
</body>
</html>
