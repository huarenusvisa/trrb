<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRRB 部署检测</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;margin:40px;background:#f6f6f6;color:#111}
.card{max-width:760px;background:white;border:1px solid #ddd;border-radius:12px;padding:24px;margin:auto}
.ok{color:#118a00;font-weight:800}.bad{color:#c40000;font-weight:800}code{background:#eee;padding:2px 6px;border-radius:5px}
</style>
</head>
<body>
<div class="card">
<h1>TRRB Netlify 部署检测</h1>
<p>版本：<b>v26-fixed</b></p>
<p>如果你能看到这一页，说明 Netlify 根目录和 HTML 部署是正常的。</p>
<ul>
<li id="js">JS：检测中...</li>
<li id="index">文章索引：检测中...</li>
<li id="image">本地图片路径：检测中...</li>
</ul>
<p>回首页：<a href="./index.html">index.html</a></p>
</div>
<script src="./articles-index.js?v=29.7"></script>
<script>
document.getElementById('js').innerHTML='<span class="ok">JS 正常执行</span>';
document.getElementById('index').innerHTML=Array.isArray(window.TRRB_ARTICLE_INDEX)&&window.TRRB_ARTICLE_INDEX.length
? '<span class="ok">文章索引正常：</span>'+window.TRRB_ARTICLE_INDEX.length+' 篇'
: '<span class="bad">文章索引失败</span>';
const img=new Image();
img.onload=()=>document.getElementById('image').innerHTML='<span class="ok">本地图片路径正常</span>';
img.onerror=()=>document.getElementById('image').innerHTML='<span class="bad">本地图片路径失败</span>';
img.src='./assets/news-images/2026/07/image-320-395x512.png?v=29.7';
</script>
</body>
</html>
