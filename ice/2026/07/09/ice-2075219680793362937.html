      <h1>ICE金边办事处聚焦柬埔寨公民遣返和旅行证件办理</h1>
      <div class="article-meta">
        <time datetime="2026-07-09T14:05:02.000Z">2026年7月9日 上午10:05</time>
        <span>来源：美国移民与海关执法局</span>
      </div>
      <p class="article-summary">美国移民与海关执法局金边办事处主要负责柬埔寨公民遣返及旅行证件获取工作。</p>
      <figure class="article-image"><img src="https://pbs.twimg.com/ext_tw_video_thumb/2075218490143744000/pu/img/ylO77xXDZOctQbWC.jpg" alt="ICE金边办事处聚焦柬埔寨公民遣返和旅行证件办理" loading="lazy" referrerpolicy="no-referrer"><figcaption>图片来源：ICE官方X账号公开内容</figcaption></figure>
      <div class="article-body"><p>唐人日报7月9日讯：美国移民与海关执法局（ICE）驻柬埔寨金边的执法与遣返行动代表主要工作职责为促进柬埔寨公民的遣返工作。</p>
<p>该办事处着重于优化获取相关旅行证件的流程，以确保遣返行动的顺利进行。</p></div>
