      <h1>美国一名年轻移民高中文凭刚成就后被ICE拘留</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T00:40:52.000Z">2026/7/11 20:40:52</time>
        <span>来源：La Silla Rota</span>
      </div>
      <p class="article-summary">一名年轻移民在美国完成高中学业后不久，被移民执法局ICE拘留，正处于移民身份处理阶段。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：一位年轻移民在美国成功完成高中学业，但在毕业不久后被美国移民与海关执法局（ICE）拘留。</p>
<p>该移民目前正处于移民身份处理过程中，拘留发生在其毕业仪式之后。</p></div>
