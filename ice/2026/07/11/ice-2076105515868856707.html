      <h1>伊利诺伊州法庭外 ICE执法行动中一男子头骨骨折</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T00:45:01.000Z">2026/7/11 20:45:01</time>
        <span>来源：Sintexto</span>
      </div>
      <p class="article-summary">目击者称美国伊利诺伊州一男子在ICE执法暴力行动中头骨骨折。</p>
      <figure class="article-image"><img src="https://pbs.twimg.com/amplify_video_thumb/2076104752958525440/img/ED82vB8QCbGqA4U4.jpg" alt="伊利诺伊州法庭外 ICE执法行动中一男子头骨骨折" loading="lazy" referrerpolicy="no-referrer"><figcaption>图片来源：Sintexto公开内容</figcaption></figure>
      <div class="article-body"><p>唐人日报7月11日讯：据目击者报道，美国伊利诺伊州一场ICE针对移民的突袭中，一名男子在法院外遭暴力对待，导致头骨骨折。</p>
<p>该消息由Sintexto通过社交媒体发布，揭露了ICE行动中涉及的暴力行为。</p></div>
