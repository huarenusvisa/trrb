      <h1>ICE回应关于逮捕及遣返非法移民的质疑</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T04:18:35.000Z">2026/7/12 00:18:35</time>
        <span>来源：Freedom of speech matters</span>
      </div>
      <p class="article-summary">ICE针对关于逮捕和遣返非法移民是否构成腐败提出质疑。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：针对公众对于ICE逮捕和遣返非法移民行为的质疑，ICE/HSI通过官方渠道表示，逮捕和遣返非法移民是其职责所在，质疑此行为为腐败缺乏实际依据。</p></div>
