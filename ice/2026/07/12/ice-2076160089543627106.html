      <h1>ICE官员强调在各地拘留非法移民的执法必要性</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T04:21:53.000Z">2026/7/12 00:21:53</time>
        <span>来源：LockTheMoon2</span>
      </div>
      <p class="article-summary">ICE官员表示，无论是否戴面具，他们需要在各地拘留非法入境者。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：美国移民及海关执法局（ICE）官员近日表示，无论他们是否戴面具，都必须在一切可能的地点拘留非法居留的移民。</p>
<p>该表态强调了ICE在移民执法行动中的积极部署策略，目的是有效执行移民拘留职能。</p></div>
