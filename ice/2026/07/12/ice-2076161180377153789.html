      <h1>康涅狄格州社区支持ICE执法</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T04:26:13.000Z">2026/7/12 00:26:13</time>
        <span>来源：Let’s Flip CT RED!</span>
      </div>
      <p class="article-summary">康涅狄格州多地社区表达支持ICE执法，认为其必要且受到欢迎。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：近日，康涅狄格州部分社区通过社交媒体表达了对美国移民和海关执法局（ICE）执法工作的支持。</p>
<p>相关人士在X平台发布消息称，ICE在许多康涅狄格州社区中被认为是必需并受到欢迎的执法机构。</p></div>
