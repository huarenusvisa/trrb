      <h1>ICE和国土安全部在行动中寻找符合描述的危地马拉籍乘客</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T04:30:36.000Z">2026/7/12 00:30:36</time>
        <span>来源：SinEmbargo</span>
      </div>
      <p class="article-summary">ICE与国土安全部表示，特工正在寻找两名符合乘客描述的危地马拉籍人员。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：美国移民与海关执法局（ICE）和国土安全部表示，执法人员目前正在寻找另外两名符合某名乘客描述的危地马拉籍人员。</p>
<p>相关行动旨在确认并寻找符合描述的人员，但具体行动细节和结果尚未公布。</p></div>
