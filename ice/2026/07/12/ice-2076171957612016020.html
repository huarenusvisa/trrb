      <h1>ICE官员强调普通美国人生活无涉执法行动</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T05:09:02.000Z">2026/7/12 01:09:02</time>
        <span>来源：Col1234567</span>
      </div>
      <p class="article-summary">ICE官员表示普通美国人不会因特朗普政治立场受到ICE逮捕，媒体多报道极端事件。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：ICE/HSI官员在社交媒体上回应称，普通美国人不会因政治因素受到执法影响，强调多数人追求和平生活。</p>
<p>该官员指出媒体倾向报道极端和负面事件，未能全面反映大多数人的实际情况。</p></div>
