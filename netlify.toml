[build]
  command = "find netlify/functions -type f \\( -name '*.test.js' -o -name '*.test.cjs' -o -name '*.test.mjs' -o -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.test.jsx' \\) -delete && node scripts/generate-sitemaps.mjs && node scripts/validate-site.mjs"
  publish = "."

[images]
  remote_images = [
    "https:\\/\\/images\\.openai\\.com\\/.*",
    "https:\\/\\/i\\.abcnewsfe\\.com\\/.*",
    "https:\\/\\/pbs\\.twimg\\.com\\/.*",
    "https:\\/\\/media\\.cnn\\.com\\/.*",
    "https:\\/\\/a57\\.foxnews\\.com\\/.*",
    "https:\\/\\/static01\\.nyt\\.com\\/.*",
    "https:\\/\\/dims\\.apnews\\.com\\/.*",
    "https:\\/\\/media-cldnry\\.s-nbcnews\\.com\\/.*",
    "https:\\/\\/www\\.ice\\.gov\\/.*",
    "https:\\/\\/www\\.dhs\\.gov\\/.*"
  ]

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/news-sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=UTF-8"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Security-Policy = "upgrade-insecure-requests; block-all-mixed-content"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/assets/news-images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/images*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/category-placeholders/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from = "/wp-content/uploads/:year/:month/:file"
  to = "/assets/news-images/:year/:month/:file"
  status = 200

[[redirects]]
  from = "http://new.trrb.net/*"
  to = "https://new.trrb.net/:splat"
  status = 301
  force = true
