      <h1>明尼苏达州州长赦免犯罪非法移民，ICE将其遣返老挝</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T18:17:29.000Z">2026/7/10 14:17:29</time>
        <span>来源：美国移民与海关执法局（ICE）</span>
      </div>
      <p class="article-summary">明尼苏达州州长赦免犯罪非法移民Tou Lue Vang，ICE已安排其返回老挝。</p>
      <figure class="article-image"><img src="https://pbs.twimg.com/media/HM4srO6W8AAofzx.jpg" alt="明尼苏达州州长赦免犯罪非法移民，ICE将其遣返老挝" loading="lazy" referrerpolicy="no-referrer"><figcaption>图片来源：美国移民与海关执法局（ICE）公开X内容</figcaption></figure>
      <div class="article-body"><p>唐人日报7月10日讯：明尼苏达州州长对犯罪非法移民Tou Lue Vang给予赦免。</p>
<p>美国移民与海关执法局（ICE）随即安排其返回原籍国老挝。</p>
<p>此次遣返是在总统及国土安全部长领导下执行的行动的一部分。</p></div>
