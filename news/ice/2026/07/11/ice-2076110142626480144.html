      <p class="article-summary">ICE在休斯敦拘留一名涉嫌非法入境者，网友就执法手段引发讨论。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：据社交平台X账号@LocutusF发布信息，ICE在德州休斯敦拘留一名涉嫌非法入境者。</p>
<p>发布者辩解执法行动未使用过度武力，称执法人员目标为非法者，有网友质疑执法方式。</p></div>
