      <h1>美洲西班牙裔人士因抵抗ICE逮捕被形容肤色变化</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T01:47:48.000Z">2026/7/11 21:47:48</time>
        <span>来源：ᛉ</span>
      </div>
      <p class="article-summary">有报道称美洲西班牙裔因抵抗ICE逮捕，被形容肤色外观变化。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：一则社交媒体帖子称，美洲西班牙裔人士因试图逃避和抵抗ICE执法人员的逮捕，被形容为肤色似乎发生了变化。</p>
<p>该帖文指出这些人抗拒逮捕并与执法人员发生冲突，但未提供具体事件或执法细节。</p></div>
