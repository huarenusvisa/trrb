      <h1>德州东部一司机遭ICE激烈追捕</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T04:30:34.000Z">2026/7/12 00:30:34</time>
        <span>来源：SinEmbargo</span>
      </div>
      <p class="article-summary">7月7日，德州东部一司机驾驶车辆遭ICE特工激烈追捕。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：7月7日，Lorenzo Salgado Araujo驾驶一辆小型运输车，车内有三名工人，前往德州东部一处建筑工地。</p>
<p>行程本为日常通勤，但途中遭遇美国移民与海关执法局（ICE）特工的激烈追逐。</p></div>
