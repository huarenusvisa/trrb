      <h1>堪萨斯城警方配合ICE行动，找回多名失踪儿童</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T04:50:43.000Z">2026/7/12 00:50:43</time>
        <span>来源：The Bruiser</span>
      </div>
      <p class="article-summary">堪萨斯城地区开展为期一年的行动，重点保护人群安全，找回多名当地失踪儿童。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：ICE参与了一项为期约一年的行动，旨在围绕世界杯赛事保护群众安全并防止人口剥削。</p>
<p>此次行动在堪萨斯城地区展开，成功找回的儿童多为当地被报告失踪的逃跑儿童，由家人或监护人寻回。</p></div>
