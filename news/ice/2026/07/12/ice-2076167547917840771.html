      <p class="article-summary">国会部分共和党议员阻止对休斯顿一名无辜男子被ICE杀害事件的调查。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：据社交媒体X账号@Emolclause消息，国会中的共和党议员正在阻挠针对ICE导致一名休斯顿无辜男子死亡的调查。该男子并非ICE执法行动的目标。</p></div>
