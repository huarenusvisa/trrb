      <h1>ICE将对非法选票寄送行为采取遣返行动</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T04:52:48.000Z">2026/7/12 00:52:48</time>
        <span>来源：Jim Koon</span>
      </div>
      <p class="article-summary">ICE将遣返涉非法选票寄送的非美国公民，案件引发关注。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：据ICE官方人员Jim Koon在社交媒体发布的信息，ICE将对非法向非美国公民寄送选票的行为进行遣返行动。</p>
<p>该事件涉及新墨西哥州霍布斯市，相关官员需对此事做出解释。</p></div>
