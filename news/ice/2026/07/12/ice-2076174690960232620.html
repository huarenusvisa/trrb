      <h1>亚特兰大一男子提及父亲被ICE遣返情况</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T05:19:54.000Z">2026/7/12 01:19:54</time>
        <span>来源：graceecarg 🏳️‍⚧️</span>
      </div>
      <p class="article-summary">男子在音乐专辑中提到其父亲于18年前因贩毒被ICE遣返的经历。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：在亚特兰大，一名男子在其音乐专辑中表达了对总统及相关政策的不满，提及其父亲在18年前因贩卖可卡因被ICE遣返。</p>
<p>该男子指出其父亲当时已服满刑期，遣返发生在其父亲从事共享出行工作期间。</p></div>
