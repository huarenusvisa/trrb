      <h1>美国公民涉嫌妨碍司法遭ICE拘留</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T05:23:33.000Z">2026/7/12 01:23:33</time>
        <span>来源：No dice</span>
      </div>
      <p class="article-summary">一名美国公民因涉嫌妨碍司法，被美国移民和海关执法局拘留。</p>
      <figure class="article-image"><img src="https://pbs.twimg.com/media/HNAOtveXcAAynDZ.jpg" alt="美国公民涉嫌妨碍司法遭ICE拘留" loading="lazy" referrerpolicy="no-referrer"><figcaption>图片来源：No dice公开内容</figcaption></figure>
      <div class="article-body"><p>唐人日报7月12日讯：据官方社交媒体账号@ProICE1776发布消息，一名美国公民因自愿介入执法行动，意图妨碍司法，被美国移民和海关执法局（ICE）拘留。</p>
<p>该账户指出，涉事人员未遵守执法要求，强调执法过程中必须配合相关规定。</p></div>
