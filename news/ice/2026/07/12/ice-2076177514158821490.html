      <h1>ERO执法人员具备全面逮捕权，民众观察须保持安全距离</h1>
      <div class="article-meta">
        <time datetime="2026-07-12T05:31:07.000Z">2026/7/12 01:31:07</time>
        <span>来源：Denise Kay</span>
      </div>
      <p class="article-summary">ERO执法人员为联邦执法人员，拥有全面逮捕权，民众如干扰执法可能被拘留或逮捕。</p>
      
      <div class="article-body"><p>唐人日报7月12日讯：美国移民执法局（ERO）执法人员是拥有全面逮捕权的联邦执法人员。</p>
<p>公众在旁观执法过程中应保持安全距离，避免干扰执法行动，否则可能面临被拘留或逮捕。</p></div>
