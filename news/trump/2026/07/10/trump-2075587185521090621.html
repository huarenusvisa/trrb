      <h1>特朗普表示不签署住房法案引发白宫与国会对峙</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T14:25:22.000Z">2026/7/10 10:25:22</time>
        <span>来源：The Wall Street Journal</span>
      </div>
      <p class="article-summary">特朗普总统表示不会签署旨在解决住房成本问题的关键立法，导致白宫与国会出现对峙局面。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普总统表示他不会签署一项具有里程碑意义的住房法案，此举导致白宫和国会围绕立法者应对选民住房成本问题的努力陷入对峙。</p></div>
