      <h1>特朗普拒绝签署两党住房法案以示抗议</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T14:50:02.000Z">2026/7/10 10:50:02</time>

      </div>
      <p class="article-summary">特朗普宣布因参议院未通过SAVE法案，拒绝签署已送达的两党住房法案。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：美国总统特朗普周五在社交媒体上表示，将拒绝签署国会已送达其办公桌的两党住房法案，以抗议参议院尚未通过SAVE法案。</p></div>
