      <h1>佛罗里达和田纳西推出特朗普命名标识</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T16:00:24.000Z">2026/7/10 12:00:24</time>
        <span>来源：NBC News</span>
      </div>
      <p class="article-summary">佛罗里达棕榈滩和田纳西丹德里奇推出标识以纪念唐纳德·特朗普总统。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：佛罗里达棕榈滩和田纳西丹德里奇的官员推出了标识，以纪念唐纳德·特朗普总统。特朗普此前曾喜欢将自己的名字用于联邦建筑和药品折扣计划等多项事务。</p></div>
