      <h1>特朗普预计不会否决国会住房法案</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T16:42:55.000Z">2026/7/10 12:42:55</time>
        <span>来源：CBS News</span>
      </div>
      <p class="article-summary">据美国官员透露，特朗普总统预计不会否决国会通过的标志性住房法案，该法案将无需其签名自动成为法律。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：美国一位官员告诉CBS新闻，特朗普总统预计不会对上月国会通过的标志性住房法案行使否决权，该法案将无须总统签名自动生效。</p></div>
