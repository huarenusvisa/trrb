      <h1>特朗普启用新律师团队</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T18:00:21.000Z">2026/7/10 14:00:21</time>
        <span>来源：The Washington Post</span>
      </div>
      <p class="article-summary">特朗普任命一支不太知名的民事诉讼律师团队为个人法律顾问。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普选用一组较为陌生的民事诉讼律师作为他的个人律师团队。据特朗普一位顾问称，这支团队的关键优势是敢于提出其他律师可能回避的辩论。</p></div>
