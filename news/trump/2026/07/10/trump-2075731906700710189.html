      <h1>特朗普关于空军一号去向表述不一</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T00:00:26.000Z">2026/7/10 20:00:26</time>
        <span>来源：USA TODAY</span>
      </div>
      <p class="article-summary">特朗普称卡塔尔赠送的空军一号将归其总统图书馆，埃里克·特朗普表示将是另一架飞机。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：美国前总统特朗普表示，他从卡塔尔获得的空军一号飞机未来将归属于他的总统图书馆，但其子埃里克·特朗普称，将由另一架飞机归入图书馆。</p></div>
