      <h1>特朗普警告如果伊朗图谋杀害他将予以沉重打击</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T09:43:00.000Z">2026/7/11 05:43:00</time>
        <span>来源：CNBC</span>
      </div>
      <p class="article-summary">特朗普警告伊朗若谋害他，将进行严重报复。美国财政部制裁一名涉嫌伊朗的金融家。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：特朗普威胁称，如果伊朗试图杀害他，他将对伊朗进行严厉打击。同时，美国财政部对一名被指涉嫌与伊朗有关的金融家实施制裁。</p></div>
