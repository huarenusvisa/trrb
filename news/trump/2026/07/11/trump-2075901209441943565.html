      <h1>经济为特朗普选民首要关注点</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T11:13:11.000Z">2026/7/11 07:13:11</time>
        <span>来源：The Wall Street Journal</span>
      </div>
      <p class="article-summary">调查显示约四成2024年美国选民将经济视为首要问题，华尔街日报采访特朗普支持者谈及其经济表现。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：华尔街日报报道，2024年美国大选中约40%的选民认为经济是最重要的问题，远超其他议题。报道还采访了特朗普的支持者，围绕其在经济方面的表现进行了讨论。</p></div>
