      <h1>史密森学会秘书反驳白宫关于美国历史博物馆的指控</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T12:21:52.000Z">2026/7/11 08:21:52</time>
        <span>来源：ABC News</span>
      </div>
      <p class="article-summary">史密森学会秘书否认白宫指责美国历史博物馆及其领导层展示“激进观点”的报告。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：史密森学会秘书Lonnie Bunch驳斥了白宫于七月四日发布的严厉报告，该报告指责美国国家历史博物馆及其领导层展示了“激进的美国历史观”。</p></div>
