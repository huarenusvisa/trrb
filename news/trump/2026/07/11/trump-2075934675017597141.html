      <p class="article-summary">卢比奥称被州长维尔兹赦免的强奸犯将被驱逐，不会再危害美国人。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：美国参议员马可·卢比奥对明尼苏达州州长蒂姆·维尔兹赦免一名强奸犯并将其驱逐出境的行动发表看法，称该罪犯永远不会再危害另一位美国人。</p></div>
