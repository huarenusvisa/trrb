      <p class="article-summary">特朗普承诺将授予乌克兰爱国者导弹系统使用许可，防务承包商对此表示关注。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：一位资深共和党议员称，特朗普承诺美国将授予乌克兰爱国者导弹系统的许可证，美国防务承包商包括洛克希德·马丁对此持有浓厚兴趣。</p></div>
