      <h1>特朗普政府调整《濒危物种法》范围</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T16:00:13.000Z">2026/7/11 12:00:13</time>
        <span>来源：NBC News</span>
      </div>
      <p class="article-summary">特朗普政府改变了这部已有五十年历史的法律的适用范围，该法帮助保护多种濒危动植物。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：特朗普政府对已有半个世纪历史的《濒危物种法》作出调整，限制了法律的适用范围。该法律曾有助于保护白头鹰、加州秃鹰等多种物种免于灭绝。</p></div>
