      <h1>白宫官员谈博物馆对公众情绪影响</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T16:23:33.000Z">2026/7/11 12:23:33</time>
        <span>来源：Rapid Response 47</span>
      </div>
      <p class="article-summary">白宫国内政策委员会主任称有人希望公众离开博物馆时心怀愤怒，抵制政治势力。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：白宫国内政策委员会主任文斯·黑利表示，有人希望人们走出博物馆时不是对国家感到高兴或鼓舞，而是愤怒并寻求抵制他们反对的政治力量。</p></div>
