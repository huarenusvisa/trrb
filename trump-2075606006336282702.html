      <h1>特朗普政府涉外法案诉讼进展受阻</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T15:40:09.000Z">2026/7/10 11:40:09</time>
        <span>来源：NBC News</span>
      </div>
      <p class="article-summary">涉及《外国敌人法案》的诉讼在法院停滞，委内瑞拉总统马杜罗被罢免可能影响特朗普政府法律立场。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：有关《外国敌人法案》的诉讼案件目前在法院审理过程中陷入停滞。此外，委内瑞拉总统尼古拉斯·马杜罗的罢免可能削弱了特朗普政府的相关法律主张。</p></div>
