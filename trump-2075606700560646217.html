      <p class="article-summary">特朗普政府与堪萨斯州就2022年Keystone管道油泄漏引发的清洁水法违规达成和解。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普政府和堪萨斯州已与Keystone管道的拥有者和运营方就涉嫌违反清洁水法的2022年油泄漏事件达成和解。</p></div>
