      <h1>特朗普宣布不签署关键住房法案</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T16:26:34.000Z">2026/7/10 12:26:34</time>
        <span>来源：BBC News (World)</span>
      </div>
      <p class="article-summary">特朗普表示将拒绝签署一项具有里程碑意义的住房法案以示抗议。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：美国前总统特朗普宣布，他将不会签署一项被称为具有里程碑意义的住房法案，以表达抗议态度。</p></div>
