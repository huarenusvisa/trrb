      <h1>特朗普政府拟放宽对阿联酋出口限制</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T16:34:57.000Z">2026/7/10 12:34:57</time>
        <span>来源：Bloomberg</span>
      </div>
      <p class="article-summary">特朗普政府计划放松对阿联酋的出口限制，允许其购买商业卫星及用于人工智能的半导体等先进技术。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普政府计划放宽针对阿联酋的出口限制，使该海湾国家能够购买范围广泛的先进技术产品，包括商业卫星和用于人工智能的半导体芯片。</p></div>
