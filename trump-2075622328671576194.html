      <h1>特朗普政府计划在白宫附近永久设立围栏</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T16:45:01.000Z">2026/7/10 12:45:01</time>
        <span>来源：CBS News</span>
      </div>
      <p class="article-summary">特朗普政府官员正讨论在宾夕法尼亚大道白宫附近永久设立围栏，以增强安全并减少临时障碍物的反复搭建费用。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普政府官员正在讨论一项计划，拟在白宫附近的宾夕法尼亚大道设立永久性围栏，目的是提升安全保障并降低为特殊活动反复搭建和拆除临时障碍的成本。</p></div>
