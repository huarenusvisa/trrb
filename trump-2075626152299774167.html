      <h1>两党支持住房法案或成法律</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T17:00:12.000Z">2026/7/10 13:00:12</time>
        <span>来源：NBC News</span>
      </div>
      <p class="article-summary">国会通过两党支持的住房负担法案，特朗普若不否决将于周六生效。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：国会以压倒性票数通过了一项两党支持的住房负担能力法案，若特朗普总统不予以否决，该法案将于周六成为法律。</p></div>
