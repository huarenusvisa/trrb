      <h1>特朗普政府撤销《濒危物种法》中对“危害”定义</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T17:13:15.000Z">2026/7/10 13:13:15</time>
        <span>来源：Fox News Politics</span>
      </div>
      <p class="article-summary">特朗普政府取消了《濒危物种法》中对“危害”的监管定义，理由是被前届政府滥用。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普政府宣布撤销《濒危物种法》中有关“危害”的监管定义，指出该定义曾被前任政府利用以阻碍钻探、伐木、基础设施项目及私人土地使用。</p></div>
