      <h1>特朗普宣布不签署经济适用房法案</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T17:20:15.000Z">2026/7/10 13:20:15</time>
        <span>来源：USA TODAY</span>
      </div>
      <p class="article-summary">特朗普总统表示不会签署一项标志性经济适用房法案，法案预计将于月底自动生效。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普总统表示，他不会签署一项标志性的经济适用房法案。该法案若在七月十日结束时未被签署，将自动成为法律。</p></div>
