      <h1>特朗普政府支持对俄油采购施加重罚</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T18:15:00.000Z">2026/7/10 14:15:00</time>
        <span>来源：CBS News</span>
      </div>
      <p class="article-summary">特朗普政府拟支持法案，重罚购买俄油者以加大对莫斯科经济压力。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普政府将支持一项法案草案，对购买俄罗斯石油者施加重罚，以加强对莫斯科的经济压力，旨在促使俄罗斯结束对乌克兰的战争。</p></div>
