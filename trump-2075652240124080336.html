      <h1>特朗普领导下欧洲防务开支增加</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T18:43:52.000Z">2026/7/10 14:43:52</time>
        <span>来源：Rapid Response 47</span>
      </div>
      <p class="article-summary">北约美国大使称欧洲在特朗普领导下开始增加防务开支。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：美国驻北约大使表示，长期以来欧洲防务不足，在特朗普总统领导下，欧洲开始提升防务支出，增强自身能力，首次在77年内更多承担欧洲常规防卫责任。</p></div>
