      <h1>伊朗葬礼现场出现针对特朗普的死亡威胁</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T19:10:49.000Z">2026/7/10 15:10:49</time>
        <span>来源：Fox News</span>
      </div>
      <p class="article-summary">在伊朗最高领袖卡米内伊葬礼上，民众展示“我们将杀死特朗普”的横幅。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：在伊朗最高领袖阿亚图拉·阿里·卡米内伊的葬礼仪式上，数千人聚集展示了写有“我们将杀死特朗普”的巨幅横幅和标语。人群多次誓言为卡米内伊之死复仇，同时标语中也威胁到了美国副总统JD·万斯。</p></div>
