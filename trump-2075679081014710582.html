      <p class="article-summary">《华尔街日报》报道称以色列发现伊朗针对特朗普总统的暗杀阴谋，此消息紧随特朗普宣布停火结束后发布。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：据《华尔街日报》报道，以色列发现了一个针对美国总统特朗普的伊朗暗杀阴谋。此消息在特朗普宣布停火结束之后发布。</p></div>
