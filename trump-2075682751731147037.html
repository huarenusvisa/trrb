      <h1>特朗普政府延长多国人道主义移民工作许可</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T20:45:06.000Z">2026/7/10 16:45:06</time>
        <span>来源：The Washington Post</span>
      </div>
      <p class="article-summary">特朗普政府临近工作许可到期前延长包括海地在内七国人道移民工作许可。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普政府在数十万人工作许可即将到期前数小时，延长了含海地在内七国享有人道主义保护移民的工作许可。</p></div>
