      <h1>特朗普解除选举协助委员会民主党成员职务</h1>
      <div class="article-meta">
        <time datetime="2026-07-10T21:43:40.000Z">2026/7/10 17:43:40</time>
        <span>来源：NewsNation</span>
      </div>
      <p class="article-summary">特朗普总统解除了独立选举协助委员会中所有民主党成员的职务。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：美国总统特朗普解除了独立选举协助委员会中剩余的民主党成员职务。该委员会负责帮助选民参与选举及维护全国邮寄选民登记表。</p></div>
