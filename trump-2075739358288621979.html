      <h1>特朗普政府废止濒危物种栖息地保护规定</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T00:30:03.000Z">2026/7/10 20:30:03</time>
        <span>来源：The Washington Post</span>
      </div>
      <p class="article-summary">特朗普政府最终废止了将栖息地破坏视为对濒危物种伤害的旧规。</p>
      
      <div class="article-body"><p>唐人日报7月10日讯：特朗普政府完成废止一项已有数十年历史的规定，该规定将栖息地破坏定义为对濒危物种的伤害。此举可能允许采矿、牧场经营及其他开发活动扩展至此前受保护的区域。</p></div>
