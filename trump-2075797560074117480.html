      <h1>特朗普未签署两党住房法案后自动成为法律</h1>
      <div class="article-meta">
        <time datetime="2026-07-11T04:21:19.000Z">2026/7/11 00:21:19</time>
        <span>来源：CBS News</span>
      </div>
      <p class="article-summary">特朗普因参议院未行动选举法案未签署两党住房法案，该法案已自动生效。</p>
      
      <div class="article-body"><p>唐人日报7月11日讯：一项具有里程碑意义的两党住房法案在特朗普总统拒绝签署后，于周六午夜自动成为法律。特朗普表示不签署是为了抗议参议院未采取行动的SAVE America选举法案。</p></div>
